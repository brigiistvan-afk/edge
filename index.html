<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Essentials</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ░░ SZÁMOLÓGÉP ÁLCA ░░ -->
    <div id="ghost-app">
        <div class="calc-display">0</div>
        <div class="calc-buttons">
            <button onclick="calc(7)">7</button>
            <button onclick="calc(8)">8</button>
            <button onclick="calc(9)">9</button>
            <button onclick="calc(4)">4</button>
            <button onclick="calc(5)">5</button>
            <button onclick="calc(6)">6</button>
            <button onclick="calc(1)">1</button>
            <button onclick="calc(2)">2</button>
            <button onclick="calc(3)">3</button>
            <button class="special" onclick="unlock()">✦</button>
            <button onclick="calc(0)">0</button>
            <button class="special" onclick="resetCalc()">C</button>
        </div>
    </div>

    <!-- ░░ FŐ APP ░░ -->
    <div id="main-app" class="hidden">
        <header>
            <div id="status">
                <div class="status-dot"></div>
                <span>CONNECTED</span>
            </div>
            <button class="safe-word" onclick="safeWord()">■ STOP</button>
        </header>

        <div id="card-area">
            <div class="category-badge intro-anim" id="category-label">— EDGE —</div>
            <div id="task-card" class="intro-anim-2">
                <h2 id="task-title">Készen állsz?</h2>
                <p id="task-desc">Állítsd be az intenzitást, majd nyomj a gombra az első feladathoz.</p>
                <div class="time-badge hidden" id="time-badge"></div>
            </div>
        </div>

        <div class="controls intro-anim-3">
            <div class="slider-label-row">
                <span class="slider-label">LÁGY</span>
                <span class="slider-label" id="level-text">KÖZEPES</span>
                <span class="slider-label">INTENZÍV</span>
            </div>
            <input type="range" min="1" max="3" value="2" id="mood-slider" oninput="updateSliderLabel()">
            <button id="action-btn" onclick="nextTask()">KEZDJÜK</button>
            <button id="veto-btn" onclick="vetoTask()">ÚJAT KÉREK</button>
        </div>
    </div>

    <!-- ░░ TIMER OVERLAY ░░ -->
    <div id="timer-overlay" class="hidden">
        <div class="timer-ring">
            <svg viewBox="0 0 200 200" width="200" height="200">
                <circle class="timer-ring-bg" cx="100" cy="100" r="90"/>
                <circle class="timer-ring-circle" cx="100" cy="100" r="90" id="ring-progress"/>
            </svg>
            <div class="timer-center">
                <div class="timer-display" id="timer-display">0:00</div>
                <div class="timer-label">VISSZASZÁMLÁLÁS</div>
            </div>
        </div>
        <button id="timer-stop-btn" onclick="stopTimer()">LEÁLLÍT</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
