<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planner</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Planner">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap');

:root {
    --gold: #d4af37;
    --gold-mid: rgba(212, 175, 55, 0.4);
    --black: #0a0a0a;
    --gray2: #1e1e1e;
    --text: #ddd8cc;
    --text-dim: #666;
    --red: #8b0000;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0;
    background: var(--black);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    overflow: hidden;
    height: 100vh;
    user-select: none;
}

.hidden { display: none !important; }

/* ── SZÁMOLÓGÉP ── */
#ghost-app {
    padding: 30px 25px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.calc-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.5rem;
    font-weight: 300;
    text-align: right;
    padding: 25px 30px;
    background: #000;
    color: #ccc;
    margin-bottom: 16px;
    border-radius: 12px;
    letter-spacing: 4px;
    border: 1px solid #1a1a1a;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
}

.calc-buttons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.calc-buttons button {
    padding: 22px;
    font-size: 1.4rem;
    font-family: 'Cormorant Garamond', serif;
    background: var(--gray2);
    border: 1px solid #222;
    color: #aaa;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s;
}

.calc-buttons button:active { background: #2a2a2a; color: #fff; }
.calc-buttons button.special { color: var(--gold); border-color: #2a2200; }

/* ── FŐ APP ── */
#main-app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--black);
    position: relative;
    overflow: hidden;
}

#main-app::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(212,175,55,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 25px 16px;
    position: relative;
    z-index: 1;
    border-bottom: 1px solid #141414;
}

#status {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
}

.status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 2.5s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.3; transform: scale(0.7); }
}

.safe-word {
    background: none;
    border: 1px solid #2a1010;
    color: #5a2020;
    padding: 7px 16px;
    border-radius: 20px;
    font-family: 'Jost', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
}

.safe-word:active { background: #2a1010; color: #c0392b; }

/* ── KÁRTYA ── */
#card-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 20px 25px;
    position: relative;
    z-index: 1;
}

.category-badge {
    font-size: 0.6rem;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 14px;
    opacity: 0.6;
    text-align: center;
}

#task-card {
    border: 1px solid rgba(212,175,55,0.18);
    padding: 28px 22px;
    border-radius: 16px;
    text-align: center;
    background: linear-gradient(145deg, #0f0f0f, #070707);
    position: relative;
    overflow: hidden;
    transition: opacity 0.3s, transform 0.3s;
}

#task-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.35), transparent);
}

#task-card.transitioning { opacity: 0; transform: translateY(10px); }

#task-title {
    font-family: 'Cormorant Garamond', serif;
    color: var(--gold);
    font-size: 1.55rem;
    font-weight: 400;
    letter-spacing: 2px;
    margin: 0 0 14px;
    line-height: 1.3;
}

#task-desc {
    font-size: 0.85rem;
    line-height: 1.8;
    color: #b8b4ac;
    margin: 0;
}

.time-badge {
    display: inline-block;
    margin-top: 16px;
    padding: 6px 16px;
    border: 1px solid #252520;
    border-radius: 20px;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--text-dim);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
}

.time-badge:active { border-color: var(--gold); color: var(--gold); }

/* ── KONTROLLOK ── */
.controls {
    padding: 14px 25px 28px;
    position: relative;
    z-index: 1;
    border-top: 1px solid #111;
}

.slider-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.slider-label { font-size: 0.6rem; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }
#level-text   { color: var(--gold); }

#mood-slider {
    width: 100%;
    height: 2px;
    -webkit-appearance: none;
    appearance: none;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-mid) 50%, #2a2a2a 100%);
    border-radius: 1px;
    outline: none;
    margin-bottom: 18px;
    display: block;
}

#mood-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--black);
    border: 2px solid var(--gold);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(212,175,55,0.3);
}

#action-btn {
    background: linear-gradient(135deg, #c9a227, #d4af37, #c9a227);
    border: none;
    color: #000;
    padding: 17px;
    border-radius: 12px;
    width: 100%;
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 0.75rem;
    letter-spacing: 4px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
}

#action-btn:active { transform: scale(0.97); filter: brightness(0.88); }

#veto-btn {
    background: transparent;
    border: 1px solid #202020;
    color: #505050;
    padding: 13px;
    border-radius: 12px;
    width: 100%;
    font-family: 'Jost', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
}

#veto-btn:active { background: #181818; color: #888; }

/* ── TIMER ── */
#timer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,5,5,0.95);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
}

.timer-ring { position: relative; margin-bottom: 20px; }
.timer-ring svg { transform: rotate(-90deg); }
.timer-ring-bg  { stroke: #1a1a1a; stroke-width: 1; fill: none; }

.timer-ring-circle {
    stroke: var(--gold);
    stroke-width: 1.5;
    fill: none;
    stroke-dasharray: 565;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear;
    stroke-linecap: round;
}

.timer-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

.timer-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.5rem;
    font-weight: 300;
    color: var(--gold);
    letter-spacing: 3px;
    line-height: 1;
}

.timer-label {
    font-size: 0.55rem;
    letter-spacing: 5px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 8px;
}

#timer-stop-btn {
    margin-top: 30px;
    background: none;
    border: 1px solid #282828;
    color: #555;
    padding: 12px 32px;
    border-radius: 25px;
    font-family: 'Jost', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 4px;
    cursor: pointer;
    text-transform: uppercase;
}

#timer-stop-btn:active { background: #1a1a1a; color: #999; }

/* ── ANIMÁCIÓK ── */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
}

.intro-anim   { animation: fadeInUp 0.5s ease forwards; }
.intro-anim-2 { animation: fadeInUp 0.5s 0.12s ease both; }
.intro-anim-3 { animation: fadeInUp 0.5s 0.24s ease both; }

    </style>
</head>
<body>

// ═══════════════════════════════════════════════════════
//  ÁLLAPOT
// ═══════════════════════════════════════════════════════
let inputBuffer   = "";
let timerInterval = null;
let timerSeconds  = 0;
let seenIds       = [];

// ═══════════════════════════════════════════════════════
//  SZÁMOLÓGÉP
// ═══════════════════════════════════════════════════════
function calc(num) {
    inputBuffer += String(num);
    document.querySelector('.calc-display').innerText = inputBuffer;
}

function resetCalc() {
    inputBuffer = "";
    document.querySelector('.calc-display').innerText = "0";
}

function unlock() {
    if (inputBuffer.trim() === "77") {
        document.getElementById('ghost-app').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        if (navigator.vibrate) navigator.vibrate([100, 50, 200]);
    } else {
        resetCalc();
    }
}

// ═══════════════════════════════════════════════════════
//  SAFE WORD
// ═══════════════════════════════════════════════════════
function safeWord() {
    stopTimer();
    location.reload();
}

// ═══════════════════════════════════════════════════════
//  SLIDER LABEL
// ═══════════════════════════════════════════════════════
function updateSliderLabel() {
    const v = parseInt(document.getElementById('mood-slider').value);
    const labels = { 1: "LÁGY", 2: "KÖZEPES", 3: "INTENZÍV" };
    document.getElementById('level-text').innerText = labels[v];
}

// ═══════════════════════════════════════════════════════
//  FELADAT LOGIKA
// ═══════════════════════════════════════════════════════
function nextTask() {
    stopTimer();
    const level   = parseInt(document.getElementById('mood-slider').value);
    let filtered  = tasksDatabase.filter(t => t.level === level);

    // Ha minden feladatot láttunk, reseteljük
    const unseenIds = filtered.map(t => t.id).filter(id => !seenIds.includes(id));
    if (unseenIds.length === 0) {
        seenIds = seenIds.filter(id => !filtered.map(t => t.id).includes(id));
    }

    const unseen  = filtered.filter(t => !seenIds.includes(t.id));
    const pool    = unseen.length > 0 ? unseen : filtered;
    const task    = pool[Math.floor(Math.random() * pool.length)];
    seenIds.push(task.id);

    showTask(task);
}

function vetoTask() {
    stopTimer();
    const level  = parseInt(document.getElementById('mood-slider').value);
    let filtered = tasksDatabase.filter(t => t.level === level);
    const current = document.getElementById('task-title').innerText;
    const pool   = filtered.filter(t => t.title !== current);
    if (pool.length === 0) return;
    const task   = pool[Math.floor(Math.random() * pool.length)];
    showTask(task);
}

function showTask(task) {
    const card = document.getElementById('task-card');
    card.classList.add('transitioning');

    setTimeout(() => {
        document.getElementById('category-label').innerText = `— ${task.cat.toUpperCase()} —`;
        document.getElementById('task-title').innerText     = task.title;
        document.getElementById('task-desc').innerText      = task.desc;

        // Idő badge
        const timeBadge = document.getElementById('time-badge');
        if (task.time && task.time > 0) {
            const m = Math.floor(task.time / 60);
            const s = task.time % 60;
            timeBadge.innerText = s > 0 ? `${m} perc ${s} mp` : `${m} perc`;
            timeBadge.classList.remove('hidden');
            timeBadge.onclick = () => startTimer(task.time, task.title);
        } else {
            timeBadge.classList.add('hidden');
            timeBadge.onclick = null;
        }

        // Action gomb szövege
        document.getElementById('action-btn').innerText = "KÖVETKEZŐ";

        card.classList.remove('transitioning');
        if (navigator.vibrate) navigator.vibrate([30, 60, 30]);
    }, 300);
}

// ═══════════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════════
function startTimer(seconds, label) {
    stopTimer();
    timerSeconds = seconds;
    const total  = seconds;
    const ring   = document.getElementById('ring-progress');
    const circumference = 2 * Math.PI * 90; // r=90

    document.getElementById('timer-overlay').classList.remove('hidden');
    updateTimerDisplay();

    timerInterval = setInterval(() => {
        timerSeconds--;
        if (timerSeconds <= 0) {
            timerSeconds = 0;
            updateTimerDisplay();
            if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
            stopTimer();
            return;
        }
        updateTimerDisplay();
        const progress = timerSeconds / total;
        ring.style.strokeDashoffset = circumference * (1 - progress);
    }, 1000);

    // Indítási pozíció
    ring.style.strokeDasharray  = circumference;
    ring.style.strokeDashoffset = 0;
}

function updateTimerDisplay() {
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    document.getElementById('timer-display').innerText =
        `${m}:${s.toString().padStart(2, '0')}`;
}

function stopTimer() {
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
    document.getElementById('timer-overlay').classList.add('hidden');
}
